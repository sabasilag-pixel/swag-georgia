<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემი პორტფოლიო</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            width: 350px;
            border: 1px solid #333;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00d4ff;
            margin-bottom: 15px;
        }

        h2 { margin-bottom: 5px; }
        p { color: #888; margin-bottom: 25px; }

        /* კონტაქტების სექცია */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #2a2a2a;
            color: #00d4ff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .contact-link:hover {
            background: #333;
            border-color: #00d4ff;
            transform: scale(1.02);
        }

        .phone-style {
            background: #00d4ff;
            color: #000;
        }

        .phone-style:hover {
            background: #00b8e6;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="me.jpg" alt="პროფილის ფოტო" class="profile-img">
        
        <h2>Tyler</h2>
        <p>Web Developer & Gamer</p>

        <div class="contact-info">
            <a href="mailto:tylertyleridze@gmail.com" class="contact-link">
                ✉️ tylertyleridze@gmail.com
            </a>

            <a href="tel:511213350" class="contact-link phone-style">
                📞 511 21 33 50
            </a>
        </div>
    </div>

</body>
</html>
