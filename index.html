<!DOCTYPE html>
<html lang="ka">
<head>

    <link rel="stylesheet" href="style.css">

<body>

    <nav class="navbar">

    <section class="products">

            <img src="https://i.imgur.com/8nZ3vV4.jpeg" class="product-img" alt="Sp5der Hoodie">
