<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემი პორტფოლიო</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #252525;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* ფოტოს სტილი */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover; /* ეს უზრუნველყოფს რომ ფოტო არ გაიწელოს */
            border: 4px solid #007bff;
            margin-bottom: 20px;
        }

        .btn-contact {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-contact:hover {
            background-color: #0056b3;
            box-shadow: 0 0 15px #007bff;
        }

        .email-text {
            display: block;
            margin-top: 10px;
            font-size: 0.9em;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="me.jpg" alt="პროფილის ფოტო" class="profile-img">
        
        <h2>გამარჯობა!</h2>
        <p>ეს ჩემი პორტფოლიოა</p>

        <a href="mailto:tylertyleridze@gmail.com" class="btn-contact">
            Contact Me
        </a>
        
        <span class="email-text">tylertyleridze@gmail.com</span>
    </div>

</body>
</html>
