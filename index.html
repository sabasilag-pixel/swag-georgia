<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            width: 380px;
            border: 1px solid #333;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00d4ff;
            margin-bottom: 20px;
            background-color: #333; /* თუ ფოტო არ გამოჩნდება, ცარიელი არ იყოს */
        }

        h2 { margin: 10px 0; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* CONTACTS SECTION */
        .contacts-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
        }

        /* მეილის სტილი */
        .email-btn {
            background: #252525;
            color: #00d4ff;
            border: 1px solid #333;
        }

        .email-btn:hover {
            background: #333;
            transform: translateY(-3px);
        }

        /* ტელეფონის სტილი */
        .phone-btn {
            background: #00d4ff;
            color: #000;
        }

        .phone-btn:hover {
            background: #00b8e6;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
            transform: translateY(-3px);
        }

        .icon { margin-right: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="me.jpg" alt="Profile" class="profile-img">
        
        <h2>Tyler</h2>
        <div class="subtitle">Web Developer & Gamer</div>

        <div class="contacts-container">
            <a href="mailto:tylertyleridze@gmail.com" class="contact-item email-btn">
                <span class="icon">✉️</span> tylertyleridze@gmail.com
            </a>

            <a href="tel:511213350" class="contact-item phone-btn">
                <span class="icon">📞</span> 511 21 33 50
            </a>
        </div>
    </div>

</body>
</html>
