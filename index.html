<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG GEORGIA | OFFICIAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SWAG GEORGIA</div>
        <ul class="nav-links">
            <li>New Arrivals</li>
            <li>Collection</li>
            <li class="contact-item">
                Contact
                <span class="email-popup">tylertyleridze@gmail.com</span>
            </li>
        </ul>
    </nav>

    <section class="products">
        <div class="product-card">
            <img src="https://images.clothes.com/img/sp5der-hoodie-purple.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=Sp5der+Hoodie'" class="product-img">
            <div class="product-info">
                <p>Sp5der Web Hoodie</p>
                <div class="price-tag">
                    <span class="old-price">70 GEL</span>
                    <span class="new-price">65 GEL</span>
                </div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://www.prada.com/content/dam/pradabkg_products/U/UJN/UJN444/102FF0002/UJN444_102F_F0002_S_181_SLF.jpg/_jcr_content/renditions/cq5dam.web.heirloom.1000.1000.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=Polo+Shirt'" alt="Polo" class="product-img">
            <div class="product-info">
                <p>Polo City Shirt</p>
                <div class="price-tag">
                    <span class="old-price">55 GEL</span>
                    <span class="new-price">40 GEL</span>
                </div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.footballfanatics.com/manchester-united/manchester-united-ronaldo-jersey.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=Ronaldo+08'" alt="Ronaldo" class="product-img">
            <div class="product-info">
                <p>Man Utd 08 Ronaldo</p>
                <div class="price-tag">
                    <span class="old-price">40 GEL</span>
                    <span class="new-price">35 GEL</span>
                </div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.footballfanatics.com/barcelona/barca-messi-jersey.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=Messi+09'" alt="Messi" class="product-img">
            <div class="product-info">
                <p>Barca 09 Messi</p>
                <div class="price-tag">
                    <span class="old-price">40 GEL</span>
                    <span class="new-price">35 GEL</span>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
